services:
  app:
    build:
      context: .
      args: { DEVICE: cpu }
    environment:
      NNM_ENV: local
      NNM_DB_URL: ${NNM_DB_URL}
      NNM_S3_BUCKET: ${NNM_S3_BUCKET}
      NNM_S3_REGION: ${NNM_S3_REGION:-ap-northeast-2}
      NNM_S3_PREFIX: ${NNM_S3_PREFIX:-papers/}
      NNM_S3_PDF_BUCKET: ${NNM_S3_PDF_BUCKET:-}
      NNM_S3_PDF_PREFIX: ${NNM_S3_PDF_PREFIX:-}
      NNM_EMBEDDING_DEVICE: cpu
      NNM_EMBEDDING_FP16: "false"
      NNM_EMBEDDING_BATCH_SIZE: "4"
      NNM_EMBEDDING_MAX_TOKENS: "8192"
      NNM_EMBEDDING_COLBERT: ${NNM_EMBEDDING_COLBERT:-false}
      NNM_EMBEDDING_SPARSE: ${NNM_EMBEDDING_SPARSE:-true}
      NNM_CHUNK_SIZE_TOKENS: ${NNM_CHUNK_SIZE_TOKENS:-512}
      NNM_CHUNK_OVERLAP_TOKENS: ${NNM_CHUNK_OVERLAP_TOKENS:-64}
      NNM_STORAGE_ROOT: /app/var
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-}
      DB_USERNAME: ${DB_USERNAME:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      NNM_GROQ_API_KEY: ${NNM_GROQ_API_KEY:-}
      NNM_GROQ_MODEL: ${NNM_GROQ_MODEL:-llama-3.3-70b-versatile}
      NNM_GROQ_BASE_URL: ${NNM_GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      NNM_RAG_TOP_K: ${NNM_RAG_TOP_K:-5}
      NNM_RAG_MAX_CONTEXT_CHARS: ${NNM_RAG_MAX_CONTEXT_CHARS:-8000}
      NNM_RAG_TEMPERATURE: ${NNM_RAG_TEMPERATURE:-0.2}
    volumes:
      - ./var:/app/var
      - ./src:/app/src
    ports: ["8170:8170"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn nnm.main:app --host 0.0.0.0 --port 8170 --reload"
